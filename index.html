<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تطبيق الجوكر - مجمع ألعاب ورق كوتشينة عربي</title>
    
    <!-- PWA Manifest support -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="shortcut icon" href="https://api.dicebear.com/7.x/bottts/svg?seed=JokerLogoMain" />
    <meta name="theme-color" content="#f59e0b" />
    
    <!-- Fonts load -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;800;1000&family=JetBrains+Mono:wght@400;750&display=swap" rel="stylesheet" />

    <style>
      body {
        font-family: 'Cairo', 'Inter', sans-serif;
      }
    </style>
  </head>
  <body class="bg-slate-950 text-white min-h-screen selection:bg-amber-500 selection:text-slate-950">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Register service worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => console.log('Service Worker Registered successfully code:', reg.scope))
            .catch((err) => console.warn('Service Worker registration failed:', err));
        });
      }
    </script>
  </body>
</html>
